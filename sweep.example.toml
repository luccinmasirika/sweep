# sweep works with no config at all — everything below is optional.
# Copy to ./sweep.toml or ~/.config/sweep/config.toml to override a default.

# Turn whole detectors on or off.
system_caches = true
app_caches = true
dev_tools = true
xcode = true
projects = true
large_items = true
privacy = true
# Leftovers (support files of uninstalled apps) is heuristic, so it is opt-in.
leftovers = false

# Where to look. Defaults to your home directory; override mainly for testing.
# home = "~"

# Extra path prefixes to skip during the deep home walk. Always skipped on top
# of these: ~/Library, ~/.Trash, and version-manager / toolchain roots like
# ~/.nvm, ~/.fnm, ~/.volta, ~/.asdf, ~/.cargo and ~/.rustup — so a global
# node_modules (which holds npm itself) is never mistaken for project junk.
exclude = []

# Regenerable build/dependency directory names the `projects` scan deletes.
# Defaults are safe; add "dist", "build" or "out" only if those are output dirs
# in your projects.
project_dir_names = [
    "node_modules", "target", ".next", ".nuxt", ".svelte-kit",
    ".turbo", ".parcel-cache", ".gradle", "Pods", "venv", ".venv",
]

# Extra folders to inspect for large personal items.
extra_large_roots = []

# A personal item must be at least this big to be listed (bytes).
large_min_bytes = 500000000

# Build/cache dirs below this are ignored to keep the list signal-heavy (bytes).
min_dir_bytes = 1000000

# Flag downloads / projects untouched for this many days.
downloads_stale_days = 90
projects_stale_days = 30
