<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <linearGradient id="sweepGrad" x1="8" y1="8" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8d6dff"/>
      <stop offset="0.55" stop-color="#5b7bff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="sweepGloss" cx="0.32" cy="0.24" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepHead" x1="26" y1="9" x2="40" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a98bff"/>
      <stop offset="1" stop-color="#3aa8ff"/>
    </linearGradient>
  </defs>
  <!-- soft drop shadow under the mark -->
  <ellipse cx="22" cy="40.5" rx="12" ry="2.6" fill="#000" opacity="0.18"/>
  <!-- the sweep arc: a fluid stroke curving up toward the broom head -->
  <path d="M10 35c-1-10 5-19 17-22" stroke="url(#sweepGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- the glossy broom head as a rounded blade -->
  <path d="M27.2 11.4 38 8.2a1.6 1.6 0 0 1 2 1.4l1 9.2a1.6 1.6 0 0 1-1.4 1.8l-9.7 1.1z" fill="url(#sweepHead)"/>
  <path d="M27.2 11.4 38 8.2a1.6 1.6 0 0 1 2 1.4l1 9.2a1.6 1.6 0 0 1-1.4 1.8l-9.7 1.1z" fill="url(#sweepGloss)"/>
  <!-- specular streak on the head -->
  <path d="M30 10.6 37 8.7" stroke="#fff" stroke-opacity="0.7" stroke-width="1.4" stroke-linecap="round"/>
  <!-- swept motion particles trailing the arc -->
  <circle cx="12" cy="33" r="2.4" fill="url(#sweepGrad)"/>
  <circle cx="18" cy="36.5" r="1.6" fill="url(#sweepGrad)" opacity="0.78"/>
  <circle cx="25" cy="38.4" r="1.1" fill="url(#sweepGrad)" opacity="0.55"/>
  <circle cx="11.2" cy="32.2" r="0.9" fill="#fff" opacity="0.7"/>
</svg>
