<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="880" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b6bff"/>
      <stop offset="0.55" stop-color="#5a8bff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="200" y1="160" x2="520" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="300" y1="280" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f6ff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0a1a3a" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- macOS rounded-rect (superellipse-ish radius ~22.4% of 1024). -->
  <rect x="92" y="92" width="840" height="840" rx="188" fill="url(#bg)"/>
  <rect x="92" y="92" width="840" height="840" rx="188" fill="url(#sheen)"/>
  <rect x="92.75" y="92.75" width="838.5" height="838.5" rx="187" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- The Sweep mark: a sweeping arc, broom head, and trailing particles. -->
  <g filter="url(#soft)">
    <path d="M300 700c0-176 118-330 312-372" stroke="url(#mark)" stroke-width="56" stroke-linecap="round"/>
    <path d="M566 326l176-58 22 178-176 58z" fill="url(#mark)"/>
    <path d="M566 326l-56 116 116 96 116-176" stroke="url(#mark)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>
    <circle cx="330" cy="676" r="40" fill="url(#mark)"/>
    <circle cx="436" cy="744" r="27" fill="url(#mark)" opacity="0.78"/>
    <circle cx="556" cy="772" r="18" fill="url(#mark)" opacity="0.55"/>
  </g>
</svg>
